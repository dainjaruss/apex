<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sign in — APEX Mockup</title><link rel="stylesheet" href="styles.css"/></head>
<body>
<div class="auth-top"><button type="button" class="btn" data-theme-toggle>Theme</button> <span data-theme-label></span></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="brand" style="margin-bottom:1.5rem">
      <div class="brand-mark">APX</div>
      <div><div class="brand-title" style="color:var(--text)">APEX</div><div class="brand-sub" style="color:var(--text-muted)">Navy evaluation workflow</div></div>
    </div>
    <h1 style="margin:0 0 .5rem;font-size:1.25rem">Sign in</h1>
    <p style="margin:0 0 1.25rem;color:var(--text-muted);font-size:.875rem">Enterprise SSO-ready layout · email fallback for dev</p>
    <label>Email</label>
    <input type="email" placeholder="name@navy.mil" style="margin-bottom:.85rem"/>
    <label>Password</label>
    <input type="password" placeholder="••••••••" style="margin-bottom:1rem"/>
    <button type="button" class="btn btn-primary" style="width:100%">Sign in</button>
    <p style="margin:1rem 0 0;font-size:.8rem;color:var(--text-muted);text-align:center"><a href="#">Register</a> · <a href="index.html">Back to mockups</a></p>
  </div>
</div>

<script>
(function(){
  const key='apex-mockup-theme';
  const root=document.documentElement;
  function apply(t){ root.setAttribute('data-theme',t); localStorage.setItem(key,t);
    document.querySelectorAll('[data-theme-label]').forEach(el=>el.textContent=t==='dark'?'Dark':'Light'); }
  apply(localStorage.getItem(key)||'light');
  document.querySelectorAll('[data-theme-toggle]').forEach(btn=>btn.addEventListener('click',()=>{
    apply(root.getAttribute('data-theme')==='dark'?'light':'dark'); }));
})();
</script>
</body></html>
